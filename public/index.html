<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>APIFlow Constellation</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <style>
      :root {
        --bg-a: #021620;
        --bg-b: #132739;
        --bg-c: #2b1d34;
        --panel: rgba(9, 24, 37, 0.76);
        --panel-border: rgba(168, 226, 255, 0.28);
        --text: #eaf8ff;
        --muted: #a7c5d8;
        --teal: #2dd4bf;
        --cyan: #38bdf8;
        --orange: #fb923c;
        --rose: #fb7185;
        --lime: #84cc16;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        font-family: "Sora", "Trebuchet MS", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 8% 14%, rgba(45, 212, 191, 0.25), transparent 40%),
          radial-gradient(circle at 84% 14%, rgba(251, 146, 60, 0.22), transparent 35%),
          radial-gradient(circle at 70% 82%, rgba(56, 189, 248, 0.2), transparent 40%),
          linear-gradient(145deg, var(--bg-a), var(--bg-b) 50%, var(--bg-c));
      }

      .shell {
        min-height: 100vh;
        display: grid;
        grid-template-rows: 84px 1fr;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 22px;
        border-bottom: 1px solid rgba(168, 226, 255, 0.24);
        background: rgba(5, 17, 28, 0.45);
        backdrop-filter: blur(10px);
      }

      .brand h1 {
        margin: 0;
        font-size: 28px;
        letter-spacing: -0.02em;
      }

      .brand p {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 12px;
        letter-spacing: 0.05em;
      }

      .stats {
        display: flex;
        gap: 10px;
      }

      .pill {
        border: 1px solid rgba(168, 226, 255, 0.35);
        background: rgba(12, 36, 54, 0.72);
        border-radius: 999px;
        padding: 7px 12px;
        font-size: 12px;
      }

      .layout {
        display: grid;
        grid-template-columns: 1fr 360px;
        gap: 14px;
        padding: 14px;
        min-height: 0;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 18px;
        overflow: hidden;
      }

      .panel-title {
        margin: 0;
        padding: 14px 16px;
        border-bottom: 1px solid rgba(168, 226, 255, 0.2);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.11em;
        color: var(--muted);
      }

      .graph-wrap {
        position: relative;
        min-height: 0;
      }

      .graph-hint {
        position: absolute;
        left: 16px;
        right: 16px;
        bottom: 12px;
        border: 1px solid rgba(251, 146, 60, 0.45);
        background: rgba(61, 34, 14, 0.55);
        border-radius: 12px;
        padding: 10px 12px;
        color: #ffd9bd;
        font-size: 13px;
      }

      svg {
        display: block;
        width: 100%;
        height: calc(100vh - 130px);
        min-height: 520px;
      }

      .orbit-line {
        fill: none;
        stroke: rgba(143, 211, 243, 0.22);
        stroke-width: 1.2;
        stroke-dasharray: 5 8;
      }

      .flow-edge {
        fill: none;
        stroke: rgba(143, 211, 243, 0.62);
        stroke-width: 2;
      }

      .bubble {
        cursor: pointer;
      }

      .bubble circle {
        transition: transform 150ms ease, filter 150ms ease, opacity 150ms ease;
      }

      .bubble:hover circle {
        filter: brightness(1.07);
      }

      .bubble.selected circle {
        filter: drop-shadow(0 0 18px rgba(56, 189, 248, 0.7));
      }

      .api-label {
        fill: #f4fdff;
        font-size: 12px;
        font-weight: 700;
        text-anchor: middle;
      }

      .api-sub {
        fill: #d0ebf8;
        font-size: 11px;
        text-anchor: middle;
      }

      .flow-label {
        fill: #f6faff;
        font-size: 10px;
        text-anchor: middle;
      }

      .details {
        padding: 16px;
        max-height: calc(100vh - 130px);
        overflow: auto;
      }

      .method {
        display: inline-block;
        padding: 4px 9px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 800;
        margin-right: 8px;
      }

      .m-get { background: rgba(45, 212, 191, 0.22); color: #8ff5e7; }
      .m-post { background: rgba(56, 189, 248, 0.23); color: #a5e5ff; }
      .m-put { background: rgba(251, 146, 60, 0.24); color: #ffd1a7; }
      .m-patch { background: rgba(251, 113, 133, 0.22); color: #ffc3ce; }
      .m-delete { background: rgba(244, 63, 94, 0.24); color: #ffbac8; }

      .path {
        font-size: 20px;
        font-weight: 800;
      }

      .summary {
        color: var(--muted);
        line-height: 1.45;
        margin: 12px 0 16px;
      }

      .focus {
        border: 1px solid rgba(132, 204, 22, 0.4);
        background: rgba(46, 68, 16, 0.42);
        border-radius: 12px;
        padding: 10px;
        margin-bottom: 14px;
      }

      .focus b {
        display: block;
        margin-bottom: 4px;
      }

      .section {
        margin-top: 16px;
      }

      .section h3 {
        margin: 0 0 8px;
        color: var(--muted);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .steps {
        margin: 0;
        padding-left: 18px;
        display: grid;
        gap: 6px;
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .chip {
        border: 1px solid rgba(168, 226, 255, 0.28);
        background: rgba(14, 34, 50, 0.7);
        border-radius: 999px;
        font-size: 12px;
        padding: 5px 10px;
      }

      .empty {
        color: var(--muted);
        margin: 8px 0;
      }

      .error {
        border: 1px solid rgba(251, 113, 133, 0.45);
        background: rgba(79, 18, 32, 0.45);
        color: #ffd1da;
        border-radius: 12px;
        padding: 10px;
        margin-top: 10px;
        font-size: 13px;
      }

      @media (max-width: 1100px) {
        .layout {
          grid-template-columns: 1fr;
          grid-template-rows: 65vh auto;
        }

        svg {
          height: 65vh;
          min-height: 420px;
        }

        .details {
          max-height: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      const { useEffect, useMemo, useState } = React;

      const fallbackApis = [
        {
          method: 'GET',
          path: '/api/graph',
          summary: 'Returns generated API dependency graph data for visualization.',
          flow: [
            'Receive request from UI explorer',
            'Read .apimap/graph.json from cache files',
            'Respond with graph payload'
          ],
          tables: [],
          services: [],
          caches: ['.apimap/graph.json'],
          queues: []
        },
        {
          method: 'GET',
          path: '/api/apis',
          summary: 'Returns API knowledge summaries from cache for endpoint navigation.',
          flow: [
            'Receive request from UI explorer',
            'Read .apimap/api_knowledge.json from cache files',
            'Flatten API entries and return the list'
          ],
          tables: [],
          services: [],
          caches: ['.apimap/api_knowledge.json'],
          queues: []
        }
      ];

      function methodClass(method) {
        return `m-${String(method || '').toLowerCase()}`;
      }

      function normalizeApis(raw) {
        const legacyPaths = new Set(['/users/:id', '/users/{id}']);
        const list = Array.isArray(raw) ? raw : [];
        const deduped = [];
        const seen = new Set();

        for (const item of list) {
          if (!item || !item.method || !item.path) continue;
          if (legacyPaths.has(item.path)) continue;
          const method = String(item.method).toUpperCase();
          const key = `${method} ${item.path}`;
          if (seen.has(key)) continue;
          seen.add(key);

          deduped.push({
            method,
            path: item.path,
            summary: item.summary || 'No summary available.',
            flow: Array.isArray(item.flow) ? item.flow : [],
            tables: Array.isArray(item.tables) ? item.tables : [],
            services: Array.isArray(item.services) ? item.services : [],
            caches: Array.isArray(item.caches) ? item.caches : [],
            queues: Array.isArray(item.queues) ? item.queues : []
          });
        }

        return deduped;
      }

      function truncate(text, size) {
        const value = String(text || '');
        return value.length <= size ? value : `${value.slice(0, size - 1)}...`;
      }

      function buildApiPositions(apis) {
        const cx = 470;
        const cy = 330;
        const radius = Math.max(170, 210 + apis.length * 4);
        return apis.map((api, i) => {
          const angle = (Math.PI * 2 * i) / Math.max(apis.length, 1) - Math.PI / 2;
          return {
            id: `${api.method} ${api.path}`,
            x: cx + Math.cos(angle) * radius,
            y: cy + Math.sin(angle) * radius,
            r: 58
          };
        });
      }

      function buildFlowNodes(flow, selected) {
        if (!selected) return [];
        const sx = selected.x;
        const sy = selected.y;
        const stepGap = 96;
        const startX = Math.min(960, sx + 170);
        const startY = Math.max(100, sy - ((flow.length - 1) * stepGap) / 2);
        return flow.map((step, i) => ({
          id: `flow-${i}`,
          label: step,
          x: startX,
          y: startY + i * stepGap,
          r: 38,
          index: i
        }));
      }

      function buildResourceNodes(api, flowNodes) {
        if (!api || !flowNodes.length) return [];

        const items = [];
        for (const table of api.tables) items.push({ type: 'table', label: table, color: '#84cc16' });
        for (const service of api.services) items.push({ type: 'service', label: service, color: '#38bdf8' });
        for (const cache of api.caches) items.push({ type: 'cache', label: cache, color: '#2dd4bf' });
        for (const queue of api.queues) items.push({ type: 'queue', label: queue, color: '#fb7185' });

        const anchor = flowNodes[Math.max(flowNodes.length - 1, 0)];
        const baseX = anchor.x;
        const baseY = anchor.y + 90;

        return items.slice(0, 12).map((item, i) => ({
          ...item,
          id: `resource-${item.type}-${i}`,
          x: baseX + (i % 4) * 90 - 130,
          y: baseY + Math.floor(i / 4) * 78,
          r: 28
        }));
      }

      function Chips({ items, empty }) {
        if (!items.length) {
          return React.createElement('p', { className: 'empty' }, empty);
        }

        return React.createElement(
          'div',
          { className: 'chips' },
          items.map((item, i) => React.createElement('span', { className: 'chip', key: `${item}-${i}` }, item))
        );
      }

      function App() {
        const [rawApis, setRawApis] = useState(fallbackApis);
        const [selectedId, setSelectedId] = useState('');
        const [focused, setFocused] = useState(null);
        const [error, setError] = useState('');

        const apis = useMemo(() => normalizeApis(rawApis), [rawApis]);
        const apiPositions = useMemo(() => buildApiPositions(apis), [apis]);

        useEffect(() => {
          async function loadApis() {
            try {
              const response = await fetch('/api/apis');
              if (!response.ok) {
                throw new Error('Using demo data. Run `apimap scan .` to load live API cache.');
              }

              const payload = await response.json();
              setRawApis(Array.isArray(payload.apis) ? payload.apis : fallbackApis);
              setError('');
            } catch (err) {
              setRawApis(fallbackApis);
              setError(err.message || 'Unable to load APIs from cache.');
            }
          }

          loadApis();
        }, []);

        useEffect(() => {
          if (!apis.length) {
            setSelectedId('');
            setFocused(null);
            return;
          }

          const exists = apis.some((api) => `${api.method} ${api.path}` === selectedId);
          if (!exists && selectedId) {
            setSelectedId('');
            setFocused(null);
          }
        }, [apis, selectedId]);

        const selectedApi = useMemo(() => {
          if (!selectedId) return null;
          return apis.find((api) => `${api.method} ${api.path}` === selectedId) || null;
        }, [apis, selectedId]);

        const selectedApiPos = useMemo(() => {
          if (!selectedApi) return null;
          return apiPositions.find((p) => p.id === `${selectedApi.method} ${selectedApi.path}`) || null;
        }, [selectedApi, apiPositions]);

        const flowNodes = useMemo(
          () => buildFlowNodes(selectedApi ? selectedApi.flow : [], selectedApiPos),
          [selectedApi, selectedApiPos]
        );

        const resourceNodes = useMemo(
          () => buildResourceNodes(selectedApi, flowNodes),
          [selectedApi, flowNodes]
        );

        function onApiClick(api) {
          const id = `${api.method} ${api.path}`;
          setSelectedId(id);
          setFocused({ title: `${api.method} ${api.path}`, body: api.summary });
        }

        function renderApiBubble(api, pos) {
          const isSelected = selectedId === `${api.method} ${api.path}`;
          return React.createElement(
            'g',
            {
              className: `bubble ${isSelected ? 'selected' : ''}`,
              key: pos.id,
              onClick: () => onApiClick(api),
              role: 'button',
              tabIndex: 0,
              onKeyDown: (e) => {
                if (e.key === 'Enter' || e.key === ' ') onApiClick(api);
              }
            },
            [
              React.createElement('circle', {
                key: 'c',
                cx: pos.x,
                cy: pos.y,
                r: pos.r,
                fill: isSelected ? 'url(#apiBubbleSelected)' : 'url(#apiBubble)',
                stroke: isSelected ? '#80f5e7' : '#8fd3f3',
                'stroke-width': isSelected ? 2.4 : 1.5
              }),
              React.createElement('text', { key: 'm', className: 'api-label', x: pos.x, y: pos.y - 6 }, api.method),
              React.createElement('text', { key: 'p', className: 'api-sub', x: pos.x, y: pos.y + 14 }, truncate(api.path, 19))
            ]
          );
        }

        return React.createElement('div', { className: 'shell' }, [
          React.createElement('header', { className: 'topbar', key: 'header' }, [
            React.createElement('div', { className: 'brand', key: 'brand' }, [
              React.createElement('h1', { key: 't' }, 'APIFlow Constellation'),
              React.createElement('p', { key: 's' }, 'Click an API bubble to expand its end-to-end flow map')
            ]),
            React.createElement('div', { className: 'stats', key: 'stats' }, [
              React.createElement('span', { className: 'pill', key: 'a' }, `${apis.length} APIs`),
              React.createElement('span', { className: 'pill', key: 'f' }, `${selectedApi ? selectedApi.flow.length : 0} Flow Steps`)
            ])
          ]),

          React.createElement('main', { className: 'layout', key: 'layout' }, [
            React.createElement('section', { className: 'panel graph-wrap', key: 'graph' }, [
              React.createElement('h2', { className: 'panel-title', key: 'h' }, 'Interactive API Bubble Graph'),
              React.createElement(
                'svg',
                { viewBox: '0 0 1200 760', key: 'svg' },
                [
                  React.createElement('defs', { key: 'defs' }, [
                    React.createElement('linearGradient', { id: 'apiBubble', x1: '0%', y1: '0%', x2: '100%', y2: '100%', key: 'g1' }, [
                      React.createElement('stop', { key: 's1', offset: '0%', 'stop-color': '#38bdf8' }),
                      React.createElement('stop', { key: 's2', offset: '100%', 'stop-color': '#2dd4bf' })
                    ]),
                    React.createElement('linearGradient', { id: 'apiBubbleSelected', x1: '0%', y1: '0%', x2: '100%', y2: '100%', key: 'g2' }, [
                      React.createElement('stop', { key: 's1', offset: '0%', 'stop-color': '#fb923c' }),
                      React.createElement('stop', { key: 's2', offset: '100%', 'stop-color': '#fb7185' })
                    ])
                  ]),

                  React.createElement('circle', {
                    className: 'orbit-line',
                    key: 'orbit',
                    cx: 470,
                    cy: 330,
                    r: Math.max(170, 210 + apis.length * 4)
                  }),

                  ...apiPositions.map((pos) => {
                    const api = apis.find((x) => `${x.method} ${x.path}` === pos.id);
                    return api ? renderApiBubble(api, pos) : null;
                  }),

                  selectedApiPos && flowNodes.length
                    ? React.createElement(
                        'g',
                        { key: 'flow' },
                        [
                          ...flowNodes.map((node, i) => {
                            const prev = i === 0 ? selectedApiPos : flowNodes[i - 1];
                            return React.createElement('path', {
                              className: 'flow-edge',
                              key: `edge-${node.id}`,
                              d: `M ${prev.x + 46} ${prev.y} C ${prev.x + 90} ${prev.y}, ${node.x - 65} ${node.y}, ${node.x - node.r} ${node.y}`
                            });
                          }),
                          ...flowNodes.map((node) =>
                            React.createElement(
                              'g',
                              {
                                className: 'bubble',
                                key: node.id,
                                onClick: () => setFocused({
                                  title: `Flow Step ${node.index + 1}`,
                                  body: node.label
                                }),
                                role: 'button',
                                tabIndex: 0,
                                onKeyDown: (e) => {
                                  if (e.key === 'Enter' || e.key === ' ') {
                                    setFocused({ title: `Flow Step ${node.index + 1}`, body: node.label });
                                  }
                                }
                              },
                              [
                                React.createElement('circle', {
                                  key: 'c',
                                  cx: node.x,
                                  cy: node.y,
                                  r: node.r,
                                  fill: '#1f4f72',
                                  stroke: '#9edbff',
                                  'stroke-width': 1.8
                                }),
                                React.createElement('text', {
                                  key: 'n',
                                  className: 'flow-label',
                                  x: node.x,
                                  y: node.y - 5
                                }, `Step ${node.index + 1}`),
                                React.createElement('text', {
                                  key: 'l',
                                  className: 'flow-label',
                                  x: node.x,
                                  y: node.y + 12
                                }, truncate(node.label, 20))
                              ]
                            )
                          ),
                          ...resourceNodes.map((resource) =>
                            React.createElement(
                              'g',
                              {
                                className: 'bubble',
                                key: resource.id,
                                onClick: () => setFocused({
                                  title: `${resource.type.toUpperCase()} Resource`,
                                  body: resource.label
                                }),
                                role: 'button',
                                tabIndex: 0,
                                onKeyDown: (e) => {
                                  if (e.key === 'Enter' || e.key === ' ') {
                                    setFocused({ title: `${resource.type.toUpperCase()} Resource`, body: resource.label });
                                  }
                                }
                              },
                              [
                                React.createElement('line', {
                                  key: 'line',
                                  x1: flowNodes[flowNodes.length - 1].x,
                                  y1: flowNodes[flowNodes.length - 1].y,
                                  x2: resource.x,
                                  y2: resource.y,
                                  stroke: 'rgba(168, 226, 255, 0.38)',
                                  'stroke-width': 1.2
                                }),
                                React.createElement('circle', {
                                  key: 'c',
                                  cx: resource.x,
                                  cy: resource.y,
                                  r: resource.r,
                                  fill: resource.color,
                                  opacity: 0.9,
                                  stroke: '#ffffff',
                                  'stroke-width': 1.1
                                }),
                                React.createElement('text', {
                                  key: 't',
                                  className: 'flow-label',
                                  x: resource.x,
                                  y: resource.y + 4
                                }, truncate(resource.label, 12))
                              ]
                            )
                          )
                        ]
                      )
                    : null
                ]
              ),
              React.createElement(
                'div',
                { className: 'graph-hint', key: 'hint' },
                selectedApi
                  ? 'Flow graph is expanded. Click any flow or resource bubble to inspect details.'
                  : 'Start by clicking one API bubble. Flow and dependencies will pop out as an interactive graph.'
              )
            ]),

            React.createElement('section', { className: 'panel', key: 'details' }, [
              React.createElement('h2', { className: 'panel-title', key: 'h' }, 'Human-Readable Details'),
              React.createElement('div', { className: 'details', key: 'd' }, [
                selectedApi
                  ? React.createElement('div', { key: 'route' }, [
                      React.createElement('span', { className: `method ${methodClass(selectedApi.method)}`, key: 'm' }, selectedApi.method),
                      React.createElement('span', { className: 'path', key: 'p' }, selectedApi.path),
                      React.createElement('p', { className: 'summary', key: 's' }, selectedApi.summary)
                    ])
                  : React.createElement('p', { className: 'empty', key: 'empty-route' }, 'No API selected yet.'),

                focused
                  ? React.createElement('div', { className: 'focus', key: 'focus' }, [
                      React.createElement('b', { key: 't' }, focused.title),
                      React.createElement('span', { key: 'b' }, focused.body)
                    ])
                  : null,

                React.createElement('div', { className: 'section', key: 'flow' }, [
                  React.createElement('h3', { key: 'h' }, 'Flow'),
                  selectedApi && selectedApi.flow.length
                    ? React.createElement(
                        'ol',
                        { className: 'steps', key: 'list' },
                        selectedApi.flow.map((step, i) =>
                          React.createElement('li', { key: `step-${i}` }, `Step ${i + 1}: ${step}`)
                        )
                      )
                    : React.createElement('p', { className: 'empty', key: 'e' }, 'Select an API to view flow steps.')
                ]),

                React.createElement('div', { className: 'section', key: 'tables' }, [
                  React.createElement('h3', { key: 'h' }, 'Tables'),
                  React.createElement(Chips, {
                    key: 'c',
                    items: selectedApi ? selectedApi.tables : [],
                    empty: 'No linked tables.'
                  })
                ]),

                React.createElement('div', { className: 'section', key: 'services' }, [
                  React.createElement('h3', { key: 'h' }, 'Services'),
                  React.createElement(Chips, {
                    key: 'c',
                    items: selectedApi ? selectedApi.services : [],
                    empty: 'No linked services.'
                  })
                ]),

                React.createElement('div', { className: 'section', key: 'caches' }, [
                  React.createElement('h3', { key: 'h' }, 'Caches'),
                  React.createElement(Chips, {
                    key: 'c',
                    items: selectedApi ? selectedApi.caches : [],
                    empty: 'No linked caches.'
                  })
                ]),

                React.createElement('div', { className: 'section', key: 'queues' }, [
                  React.createElement('h3', { key: 'h' }, 'Queues'),
                  React.createElement(Chips, {
                    key: 'c',
                    items: selectedApi ? selectedApi.queues : [],
                    empty: 'No linked queues.'
                  })
                ]),

                error ? React.createElement('div', { className: 'error', key: 'err' }, error) : null
              ])
            ])
          ])
        ]);
      }

      ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
    </script>
  </body>
</html>
