          leftPanelContent = h('aside', { className: 'left-panel', key: 'left-panel' }, [
            h('div', { className: 'panel-section', key: 'ep-header' }, [
              h('div', { className: 'panel-section-title', key: 'title' }, [
                h('span', { className: 'dot', key: 'd', style: { background: '#4f7cff', boxShadow: '0 0 6px rgba(79,124,255,0.4)' } }),
                'Endpoints (' + filteredApis.length + ')'
              ])
            ]),
            h('div', { className: 'endpoint-list-container', key: 'ep-list' },
              filteredApis.length
                ? filteredApis.map((api, i) => {
                    const id = api.method + ' ' + api.path;
                    return h('div', {
                      className: 'ep-item' + (id === selectedId ? ' active' : ''),
                      key: id + '-' + i,
                      onClick: () => onSelectApi(api, false)
                    }, [
                      h('span', { className: 'method-badge ' + methodBadgeClass(api.method), key: 'm', style: { marginTop: 1 } }, api.method),
                      h('div', { className: 'ep-info', key: 'info' }, [
                        h('div', { className: 'ep-path', key: 'p' }, api.path),
                        h('div', { className: 'ep-summary', key: 's' }, truncate(api.summary, 60))
                      ])
                    ]);
                  })
                : [h('div', { className: 'empty-text', key: 'empty' }, 'No APIs match.')]
            ),
            h('div', { className: 'panel-section', key: 'log-title', style: { marginTop: 'auto' } }, [
              h('div', { className: 'panel-section-title', key: 'title' }, [
                h('span', { className: 'dot', style: { background: '#ffb340', boxShadow: '0 0 6px rgba(255,179,64,0.4)' }, key: 'd' }),
                'Activity Log'
              ])
            ]),
            h('div', { className: 'streaming-logs', key: 'logs' },
              logs.map((log, i) =>
                h('div', { className: 'log-entry', key: 'log-' + i }, [
                  h('span', { className: 'log-time', key: 't' }, log.time),
                  h('span', { className: 'log-' + (log.type || 'msg'), key: 'm' }, log.msg)
                ])
              )
            )
          ]);

        } else if (activeNav === 'impact') {
          /* Issue #2 & #6: Impact Analysis view */
          leftPanelContent = h('aside', { className: 'left-panel', key: 'left-panel' }, [
            h('div', { className: 'impact-scope-section', key: 'scope' }, [
              h('div', { className: 'impact-scope-label', key: 'label' }, [
                h(SvgIcon, { d: 'M22 12h-4l-3 9L9 3l-3 9H2', size: 12, color: 'var(--teal)', key: 'icon' }),
                'Impact Analysis'
              ]),
              h('div', { style: { fontSize: 10, color: 'var(--text-muted)', marginBottom: 8 }, key: 'desc' },
                'Select a database table to find all APIs that touch it.'),
              /* Issue #1: Table selector shows table name + api count */
              h('select', {
                className: 'scope-select', key: 'table-select',
                value: impactTable,
                onChange: e => { setImpactTable(e.target.value); setImpactColumn(''); }
              }, [
                h('option', { value: '', key: '_' }, '— Select a table —'),
                ...impactTables.map(t => h('option', { value: t.table, key: t.table },
                  t.table + '  (' + t.apiCount + ' API' + (t.apiCount !== 1 ? 's' : '') + ')'))
              ]),
              h('select', {
                className: 'scope-select', key: 'column-select',
                value: impactColumn, disabled: !impactTable,
                onChange: e => setImpactColumn(e.target.value)
              }, [
                h('option', { value: '', key: '_' }, impactTable ? 'All columns' : 'Select table first'),
                ...availableImpactColumns.map(c => h('option', { value: c, key: c }, c))
              ]),
              impactLoading ? h('div', { className: 'scanning-indicator', key: 'loading' }, [
                h('div', { className: 'spinner', key: 's' }),
                'Analyzing...'
              ]) : null
            ]),

            /* Impact count hero */
            impactTable ? h('div', { className: 'impact-count-hero count-animate', key: 'count' }, [
              h('div', { className: 'impact-hero-num', key: 'num' }, String(animatedCount)),
              h('div', { className: 'impact-hero-label', key: 'lbl' }, 'API' + (impactResults.length !== 1 ? 's' : '') + ' Impacted'),
              h('div', { className: 'impact-hero-scope', key: 'scope' }, impactTable + (impactColumn ? ' → ' + impactColumn : ''))
            ]) : h('div', { className: 'no-scope-message', key: 'no-scope' }, [
              h('div', { style: { fontSize: 28, marginBottom: 8, opacity: 0.3 }, key: 'icon' }, '⚡'),
              h('div', { key: 'msg' }, 'Select a table above to see which APIs are impacted by changes to it.')
            ]),

            /* Impact results */
            h('div', { className: 'impact-results-list', key: 'results' },
              impactTable && impactResults.length
                ? impactResults.map((r, i) =>
                    h('div', {
                      className: 'impact-card', key: r.method + '-' + r.path + '-' + i,
                      onClick: () => {
                        const match = apis.find(a => a.method === r.method && a.path === r.path);
                        if (match) { onSelectApi(match, false); }
                      }
                    }, [
                      h('div', { className: 'impact-card-top', key: 'top' }, [
                        h('span', { className: 'method-badge ' + methodBadgeClass(r.method), key: 'm' }, r.method),
                        h('span', { className: 'impact-card-path', key: 'p' }, r.path)
                      ]),
                      h('div', { className: 'impact-card-how', key: 'how' }, r.how),
                      h('div', { className: 'impact-card-meta', key: 'meta' },
                        'Ops: ' + (r.operations || []).join(', ') + ' · ' + columnMatchLabel(r.columnMatch)
                      )
                    ])
                  )
                : impactTable && !impactLoading
                  ? [h('div', { className: 'no-scope-message', key: 'no-r' }, 'No APIs impact this scope.')]
                  : []
            ),

            impactError ? h('div', { className: 'error-banner', style: { margin: '6px 12px' }, key: 'err' }, impactError) : null
          ]);

        } else if (activeNav === 'flows') {
          /* Issue #6: Flows view */
          const apisWithFlows = apis.filter(a => a.flow && a.flow.length > 0);
          leftPanelContent = h('aside', { className: 'left-panel', key: 'left-panel' }, [
            h('div', { className: 'panel-section', key: 'header' }, [
              h('div', { className: 'panel-section-title', key: 'title' }, [
                h('span', { className: 'dot', key: 'd', style: { background: '#a78bfa', boxShadow: '0 0 6px rgba(167,139,250,0.3)' } }),
                'API Flows (' + apisWithFlows.length + ')'
              ]),
              h('div', { style: { fontSize: 10, color: 'var(--text-muted)' }, key: 'desc' }, 'Click to open flow visualization')
            ]),
            h('div', { className: 'flow-list-container', key: 'flows' },
              apisWithFlows.length
                ? apisWithFlows.map(api => {
                    const id = api.method + ' ' + api.path;
                    return h('div', {
                      className: 'flow-list-item', key: id,
                      onClick: () => { onSelectApi(api, false); setFlowApi(api); }
                    }, [
                      h('div', { className: 'flow-list-item-top', key: 't' }, [
                        h('span', { className: 'method-badge ' + methodBadgeClass(api.method), key: 'm' }, api.method),
                        h('span', { className: 'flow-list-path', key: 'p' }, api.path),
                        h('span', { className: 'flow-step-count', key: 'c' }, api.flow.length + ' steps')
                      ]),
                      h('div', { className: 'flow-list-summary', key: 's' }, truncate(api.summary, 70))
                    ]);
                  })
                : [h('div', { className: 'empty-text', key: 'e' }, 'No API flows found.')]
            )
          ]);
        }

        /* ---- Main Canvas ---- */
        const mainCanvas = h('main', { className: 'main-canvas', key: 'main-canvas' }, [
          h(BubbleGraph, { key: 'bg', apis: filteredApis, selectedId, onSelectApi, onHoverApi }),
          tooltip ? h('div', {
            className: 'bubble-tooltip visible', key: 'tooltip',
            style: {
              left: Math.min(tooltip.x + 12, window.innerWidth - 280) + 'px',
              top: (tooltip.y - 60) + 'px'
            }
          }, [
            h('div', { className: 'tt-method', key: 'm', style: { color: methodColor(tooltip.api.method) } }, tooltip.api.method),
            h('div', { className: 'tt-path', key: 'p' }, tooltip.api.path),
            h('div', { className: 'tt-summary', key: 's' }, truncate(tooltip.api.summary, 120)),
            tooltip.api.tables && tooltip.api.tables.length > 0 ?
              h('div', { key: 'tables', style: { fontSize: 9, color: 'var(--teal)', marginTop: 4 } },
                '🗄 ' + tooltip.api.tables.join(', ')) : null,
            h('div', { style: { fontSize: 9, color: '#5a6478', marginTop: 4 }, key: 'hint' }, 'Click to select • Double-click for flow')
          ]) : null,
          h('div', { className: 'canvas-footer', key: 'footer' }, [
            h('div', { className: 'canvas-legend', key: 'legend' }, [
              h('div', { className: 'legend-item', key: 'get' }, [h('div', { className: 'legend-dot', style: { background: '#00d4b1' }, key: 'd' }), 'GET']),
              h('div', { className: 'legend-item', key: 'post' }, [h('div', { className: 'legend-dot', style: { background: '#4f7cff' }, key: 'd' }), 'POST']),
              h('div', { className: 'legend-item', key: 'put' }, [h('div', { className: 'legend-dot', style: { background: '#ffb340' }, key: 'd' }), 'PUT']),
              h('div', { className: 'legend-item', key: 'patch' }, [h('div', { className: 'legend-dot', style: { background: '#a78bfa' }, key: 'd' }), 'PATCH']),
              h('div', { className: 'legend-item', key: 'del' }, [h('div', { className: 'legend-dot', style: { background: '#ff4d9e' }, key: 'd' }), 'DELETE']),
            ]),
            selectedApi ? h('button', {
              className: 'btn-sm btn-primary', key: 'view-flow',
              onClick: () => setFlowApi(selectedApi)
            }, '⚡ Flow: ' + selectedApi.method + ' ' + truncate(selectedApi.path, 20)) : null
          ])
        ]);

        /* ---- Right Panel (Issue #3: separate sections) ---- */
        const rightPanel = h('aside', { className: 'right-panel', key: 'right-panel' }, [
          h('div', { className: 'right-panel-header', key: 'header' }, [
            h('h3', { key: 't' }, selectedApi ? 'API Details' : 'API Explorer')
          ]),
          h('div', { className: 'right-panel-body', key: 'body' }, [
            selectedApi
              ? h(ApiDetailsPanel, { key: 'details', api: selectedApi, onViewFlow: () => setFlowApi(selectedApi) })
              : h('div', { key: 'no-sel', style: { padding: '24px 14px', textAlign: 'center' } }, [
                  h('div', { style: { fontSize: 28, opacity: 0.15, marginBottom: 8 }, key: 'i' }, '◎'),
                  h('div', { style: { fontSize: 12, color: 'var(--text-muted)' }, key: 't' }, 'Click a bubble to view API details.'),
                  h('div', { style: { fontSize: 10, color: 'var(--text-muted)', marginTop: 6, lineHeight: 1.5 }, key: 's' },
                    'Use the ⚡ Impact tab to analyze which APIs are affected by database changes.')
                ]),
            error ? h('div', { className: 'error-banner', key: 'err' }, error) : null
          ])
        ]);

        /* ---- Flow Overlay ---- */
        const overlay = flowApi ? h(FlowOverlay, { key: 'flow-overlay', api: flowApi, onClose: () => setFlowApi(null) }) : null;

        return h('div', { className: 'app-shell' }, [
          iconSidebar,
          topbar,
          leftPanelContent,
          mainCanvas,
          rightPanel,
          overlay
        ]);
      }

      ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
    </script>
  </body>
</html>
